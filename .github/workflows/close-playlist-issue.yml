name: Close playlist issue

# Post-#76: main requires the `guard` status check, so the live_shows_current.tsv
# write goes to `staging` via the promote deploy key (a GITHUB_TOKEN push to
# staging would NOT trigger auto-promote). No [skip ci]: auto-promote must run to
# fast-forward main. Triggered by a comment carrying the playlist URL on a
# "Playlist:" issue.

on:
  issue_comment:
    types: [created]

concurrency:
  group: close-playlist-issue
  cancel-in-progress: false

jobs:
  close-playlist:
    # Only run when:
    # 1. The comment is on an issue (not a PR)
    # 2. The issue title starts with "Playlist:"
    # 3. The comment contains a YouTube playlist URL
    if: |
      github.event.issue.pull_request == null &&
      startsWith(github.event.issue.title, 'Playlist:') &&
      contains(github.event.comment.body, 'youtube.com/playlist')

    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract date and URL from issue
        id: extract
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          python3 - << 'PYEOF'
          import re, os, sys

          title = os.environ["ISSUE_TITLE"]
          comment = os.environ["COMMENT_BODY"]

          # Extract the show date: the sole ISO date anywhere in the title. Titles vary
          # ("... - YYYY-MM-DD (Venue)" vs "... - Venue YYYY-MM-DD"), so don't anchor on the dash.
          tm = re.search(r'(\d{4}-\d{2}-\d{2})', title)
          if not tm:
              print(f"ERROR: could not extract date from title: {title!r}", file=sys.stderr)
              sys.exit(1)
          show_date = tm.group(1)

          # Extract YouTube URL from comment body
          url_re = re.compile(
              r'https?://(?:www\.)?youtube\.com/playlist\?list=[\w-]+',
              re.IGNORECASE
          )
          um = url_re.search(comment)
          if not um:
              print(f"ERROR: no YouTube playlist URL found in comment", file=sys.stderr)
              sys.exit(1)
          playlist_url = um.group(0)

          # Write to GITHUB_OUTPUT
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"show_date={show_date}\n")
              f.write(f"playlist_url={playlist_url}\n")

          print(f"show_date={show_date}")
          print(f"playlist_url={playlist_url}")
          PYEOF

      - name: Update playlist URL in live_shows_current.tsv
        run: |
          python scripts/close_playlist_issue.py \
            "${{ steps.extract.outputs.show_date }}" \
            "${{ steps.extract.outputs.playlist_url }}"

      - name: Commit updated TSV to staging
        run: |
          git add data/live_shows_current.tsv
          if git diff --cached --quiet; then
            echo "data/live_shows_current.tsv unchanged - nothing to commit."
          else
            mkdir -p "$HOME/.ssh"
            printf '%s\n' "${{ secrets.PROMOTE_DEPLOY_KEY }}" > "$HOME/.ssh/promote_key"
            chmod 600 "$HOME/.ssh/promote_key"
            export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/promote_key -o StrictHostKeyChecking=accept-new"

            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git remote add promote "git@github.com:${GITHUB_REPOSITORY}.git"

            git commit -m "playlist: ${{ steps.extract.outputs.show_date }} — added URL from issue #${{ github.event.issue.number }}"
            git fetch promote staging
            git rebase promote/staging
            git push promote HEAD:staging
          fi

      - name: Close the issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --comment "Playlist URL written to live_shows_current.tsv automatically."
