name: Potentials maintenance

# Post-#76: main requires the `guard` status check. The prune commit goes to
# `staging` via the promote deploy key (which also makes the staging push
# trigger auto-promote — GITHUB_TOKEN pushes would not). No [skip ci]: we WANT
# auto-promote to run. A pruned potential.tsv promoted back to main retriggers
# this workflow, but the second run finds nothing to prune (idempotent).

on:
  push:
    branches: [main]
    paths:
      - data/live_shows_potential.tsv
      - data/live_shows_current.tsv
  workflow_dispatch:

concurrency:
  group: potentials-maintenance
  cancel-in-progress: false

jobs:
  prune-and-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prune past-dated Pass rows from potentials
        id: prune
        run: python scripts/prune_potentials.py

      - name: Commit pruned potentials to staging (if changed)
        run: |
          if git diff --quiet; then
            echo "No prune changes — nothing to commit."
          else
            mkdir -p "$HOME/.ssh"
            printf '%s\n' "${{ secrets.PROMOTE_DEPLOY_KEY }}" > "$HOME/.ssh/promote_key"
            chmod 600 "$HOME/.ssh/promote_key"
            export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/promote_key -o StrictHostKeyChecking=accept-new"

            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git remote add promote "git@github.com:${GITHUB_REPOSITORY}.git"

            git add data/live_shows_potential.tsv tools/research/follows/new_artist_research.tsv
            git commit -m "auto: prune past-dated potentials"
            git checkout -- .
            for attempt in 1 2 3 4 5; do
              git fetch promote staging
              git rebase promote/staging || {
                echo "rebase conflict on staging — bailing (not a race, a real conflict)"
                exit 1
              }
              if git push promote HEAD:staging; then
                echo "push succeeded on attempt $attempt"
                exit 0
              fi
              echo "push rejected on attempt $attempt (staging moved) — retrying after ${attempt}s backoff"
              sleep "$attempt"
            done
            echo "gave up after 5 attempts"
            exit 1
          fi

      - name: Check Prev/Next brackets
        id: brackets
        continue-on-error: true
        run: python scripts/check_brackets.py

      - name: Summarize bracket issues
        if: steps.brackets.outcome == 'failure'
        run: |
          echo "::warning::One or more Prev/Next bracket mismatches found in live_shows_potential.tsv — run scripts/check_brackets.py locally to review."
