name: Cache-bust static assets

# Rewrites the ?v= query strings on app.js, recommend.js, artist-modal.js, and styles.css
# in index.html to the current commit SHA whenever any of those files change,
# forcing browsers/CDN to fetch the new versions immediately.
#
# Post-#76: main requires the `guard` status check, so this commits to `staging`
# via the promote deploy key (which also makes the staging push trigger
# auto-promote — GITHUB_TOKEN pushes would not). No [skip ci]: we WANT
# auto-promote to run. index.html is not a watched path, so promotion back to
# main does not retrigger this workflow.

on:
  push:
    branches: [main]
    paths:
      - app.js
      - recommend.js
      - artist-modal.js
      - styles.css
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cache-bust
  cancel-in-progress: false

jobs:
  bust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rewrite asset version strings in index.html
        run: |
          SHA="${{ github.sha }}"
          SHORT="${SHA:0:8}"

          # Replace any existing ?v=... or no version at all, for each asset.
          # Patterns handle both: href="styles.css" and href="styles.css?v=abc123"
          sed -i \
            -e "s|href=\"styles\.css\(?\([^\"]*\)\)\?\"|href=\"styles.css?v=${SHORT}\"|g" \
            -e "s|src=\"app\.js\(?\([^\"]*\)\)\?\"|src=\"app.js?v=${SHORT}\"|g" \
            -e "s|src=\"recommend\.js\(?\([^\"]*\)\)\?\"|src=\"recommend.js?v=${SHORT}\"|g" \
            -e "s|src=\"artist-modal\.js\(?\([^\"]*\)\)\?\"|src=\"artist-modal.js?v=${SHORT}\"|g" \
            index.html

          echo "Updated asset references to ?v=${SHORT}"
          grep -E '(app\.js|recommend\.js|artist-modal\.js|styles\.css)' index.html

      - name: Commit to staging if changed
        run: |
          git add index.html
          if git diff --cached --quiet; then
            echo "index.html unchanged — nothing to commit."
          else
            mkdir -p "$HOME/.ssh"
            printf '%s\n' "${{ secrets.PROMOTE_DEPLOY_KEY }}" > "$HOME/.ssh/promote_key"
            chmod 600 "$HOME/.ssh/promote_key"
            export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/promote_key -o StrictHostKeyChecking=accept-new"

            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git remote add promote "git@github.com:${GITHUB_REPOSITORY}.git"

            git commit -m "ci: cache-bust static assets"
            git fetch promote staging
            git rebase promote/staging
            git push promote HEAD:staging
          fi
