# live-shows site config (#69)
# Per-fork personalization. Any missing key falls back to DEFAULT_CONFIG in app.js.
# NOTE: title is "live-shows DC" on this branch as a visible smoke test of the config
#       override (DEFAULT_CONFIG title stays "live-shows"). Set the final value before merge.
site:
  title: live-shows
  owner: dan2bit
  repo: live-shows
  private_owner: dan2bit
  private_repo: live-shows-private
  # Brand/identity (#69 phase 3). Asset paths below are RELATIVE to repo root and are
  # expanded in app.js to absolute https://<owner>.github.io/<repo>/<path> URLs at apply
  # time, because relative asset URLs 404 on this project-pages (github.io) setup. A
  # custom-domain fork may serve these paths differently — see docs/FORK_SETUP.md.
  # pages_base: https://example.com   # uncomment to override the derived github.io base
  favicon: static/favicon.png
  brand_icon: static/brand-hat.png
  about_handle: "About @dan2bit"
  about_tagline: GenX DC native with a serious live music fixation
  about_text: "I haunt small venues across the DC/MD/VA area: blues, blues-rock, Americana, roots. I post bootleg phone recordings from what I catch. This page tracks where I've been and where I'm going."
  about_hero_image: static/hero.jpg
  about_footer: Life is short. Buy the tickets.

# Shown in the About modal. An extensible list — add or remove entries freely;
# each is rendered as a link. (#82)
about_links:
  - url: https://www.youtube.com/@dan2bit
    label: "▶ bootlegs: @dan2bit on YouTube"
  - url: https://linktr.ee/dan2bit
    label: "🎵 music links on Linktree"
  - url: https://docs.google.com/document/d/1haKMpfwPWosdPnZXBAAlLUzj3926hoTEH7icg6gTRA8/edit?usp=sharing
    label: "🎩 hat autographs"
  - url: https://photos.app.goo.gl/TMHL8xwJbAtcp33v9
    label: "📷 album: Guitar Gods & Goddesses"

# Feature toggles. Each is ON unless set to false — a fork omitting a key keeps full
# behavior. Set false to hide that subsystem entirely. (#82)
features:
  web_edit: true               # in-page config editor (gear) for authed users
  for_sale: true               # For Sale subsystem: sell group, listing banner, revoke
  recommendations: true        # "Suggest a show" CTA + recommendation modal
  calendar_integration: true   # Google Calendar link on upcoming shows
  private_data: true           # fetch the private sidecar repo when authenticated

theme:
  # Accent color — drives active tabs, dates, site title. Must pass WCAG AA as large-text.
  # Current value #c83020 is intentionally preserved (see issue #71 / PR #81 discussion).
  # Minimum AA-compliant value for this background: approx #ec4535.
  color_accent: "#c83020"         # brick red

  # Decision group colors — _dim and _bg variants are computed automatically from the
  # base color using HSL darkening; override them explicitly if you want fine control.
  color_buy: "#4a9a5a"            # sea green
  color_choose: "#c8a830"         # goldenrod
  color_sell: "#40a0a0"           # teal
  color_pass: "#878380"           # stone gray

  # Page chrome — neutral scaffold, independent of accent system. `_bright` is the raised
  # layer (buttons, inputs, pills, hover borders) sitting one step above the base.
  color_bg: "#0f0f0f"             # near-black
  color_surface: "#1a1a1a"        # charcoal
  color_surface_bright: "#222222" # dark gray
  color_border: "#2e2e2e"         # gray
  color_border_bright: "#3a3a3a"  # medium gray
  color_text: "#e8e4dc"           # bone white
  color_text_muted: "#9a928a"     # taupe gray
  color_text_dim: "#8e8a7a"       # khaki gray

  # Badge colors — derived like the semantic colors above: set the base and _dim/_bg are
  # auto-computed. The explicit _dim/_bg below are optional overrides (kept for fine control).
  color_hat: "#d08040"            # tan orange
  color_hat_dim: "#3a2010"        # dark brown
  color_hat_bg: "#1a0e08"         # near-black brown
  color_book: "#a080c0"           # lavender
  color_book_dim: "#3a2a50"       # dark indigo
  color_book_bg: "#1a1420"        # near-black plum

  # Status row tints
  color_today_bg: "#1e0e0e"       # very dark maroon
  color_soon_bg: "#1a1408"        # very dark amber-brown
  color_otd_bg: "#0e1a10"         # very dark green
  color_otd_border: "#1a4a28"     # forest green

  # Fonts — loaded from Google Fonts. Change both names to swap the entire typeface.
  # To use system fonts, set fallback stacks directly: e.g. "monospace" or "sans-serif".
  font_mono: "'IBM Plex Mono', monospace"
  font_sans: "'IBM Plex Sans', sans-serif"
