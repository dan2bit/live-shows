# live-shows site config (#69)
# Per-fork personalization. Any missing key falls back to DEFAULT_CONFIG in app.js.
site:
  title: live-shows           # also in index.html: <title>, og:title, og:site_name, twitter:title
  owner: dan2bit
  repo: live-shows
  private_owner: dan2bit
  private_repo: live-shows-private
  data_branch: staging         # branch for in-page TSV/config writes; omit or set 'main' if no staging pipeline
  # Brand/identity (#69 phase 3). Asset paths below are RELATIVE to repo root and are
  # expanded in app.js to absolute https://<owner>.github.io/<repo>/<path> URLs at apply
  # time, because relative asset URLs 404 on this project-pages (github.io) setup. A
  # custom-domain fork may serve these paths differently — see docs/FORK_SETUP.md.
  # pages_base: https://example.com   # uncomment to override the derived github.io base
  favicon: static/favicon.png
  brand_icon: static/brand-hat.png
  about_handle: "About @dan2bit"
  about_tagline: GenX DC native with a serious live music fixation
  about_text: "I haunt small venues across the DC/MD/VA area: blues, blues-rock, Americana, roots. I post bootleg phone recordings from what I catch. This page tracks where I've been and where I'm going."
  about_hero_image: static/hero.jpg   # also in index.html: og:image, twitter:image
  about_hero_alt: "Galactic at 9:30 Club Jan 2025"   # also in index.html: og:image:alt
  about_footer: Life is short. Buy the tickets.

# Page metadata mirrored into the static <head> of index.html. Social unfurlers and crawlers
# do NOT run app.js, so these values are documentation — app.js does not apply them at runtime.
# If you change one, also update the matching tag in index.html (flagged there with <!-- config: -->).
meta:
  description: "A live-music tracker for DC/MD/VA — blues, blues-rock, Americana, and roots at small venues. Where I've been, where I'm headed, and bootlegs from the shows."   # also in index.html: <meta name="description">, og:description, twitter:description

# Shown in the About modal. An extensible list — add or remove entries freely;
# each is rendered as a link. (#82)
about_links:
  - url: https://www.youtube.com/@dan2bit
    label: "▶ bootlegs: @dan2bit on YouTube"
  - url: https://linktr.ee/dan2bit
    label: "🎵 music links on Linktree"
  - url: https://docs.google.com/document/d/1haKMpfwPWosdPnZXBAAlLUzj3926hoTEH7icg6gTRA8/edit?usp=sharing
    label: "🎩 hat autographs"
  - url: https://photos.app.goo.gl/TMHL8xwJbAtcp33v9
    label: "📷 album: Guitar Gods & Goddesses"

# Tab labels. Keys are the internal tab IDs (data-tab in index.html); only the display text
# is editable. "tourhere" is the Waiting / Fast-Track tab — hide it entirely with
# features.fast_track: false below. (#82)
tabs:
  shows: Shows
  history: History
  potential: Potential
  tourhere: Waiting

# Feature toggles. Each is ON unless set to false — a fork omitting a key keeps full
# behavior. Set false to hide that subsystem entirely. (#82)
features:
  web_edit: true               # in-page config editor (gear) for authed users
  for_sale: true               # For Sale subsystem: sell group, listing banner, revoke
  recommendations: true        # "Suggest a show" CTA + recommendation modal
  calendar_integration: true   # Google Calendar link on upcoming shows
  private_data: true           # fetch the private sidecar repo when authenticated
  fast_track: true             # Waiting / Fast-Track tab (artists I want to see tour here)
  spotify_integration: true    # Spotify links in Waiting tab; set false to hide if no Spotify subsystem

# Display preferences (#82).
display:
  # Date format for show dates:
  #   mon_day  -> "Jun 12"   (default)   day_mon  -> "12 Jun"
  #   m_d      -> "6/12"                 d_m      -> "12/6"
  date_format: mon_day

  # #87 — Group/Solo badge (bystander) + ticket-count (authed) visibility on upcoming shows.
  #   Group = a multi-ticket show (public Group=Y flag); Solo = a single-ticket show.
  badge: { solo: No, group: Yes }   # which badges bystanders see
  count: { solo: No, group: Yes }   # which ticket counts authenticated users see

# Decision-stage display (#82). The stage KEYS (buy/choose/pass) are fixed in code —
# sort order, the decision dropdown, and per-stage CSS all key off them; only the display
# strings are editable here. Stage COLORS live in the theme block (color_buy/choose/pass).
stages:
  buy:
    icon: "🟩"
    label: Buy
    tagline: not purchased but probably going
  choose:
    icon: "🟡"
    label: Choose
    tagline: shows I am considering
  pass:
    icon: "◯"
    label: Pass
    tagline: considered, but not going

# Scalar thresholds (#82).
merch:
  event_cap: 100   # MERCH badge shows when Face Value (per ticket) is at or above this

badges:
  affinity:
    weights:                     # 3 main dials — must total 1.0
      tier: 0.35
      seen: 0.40
      goals: 0.25
    tier_points:                 # follows_master Tier -> score (unlisted tiers, incl. Legacy, = 0)
      Strong: 1.0
      Medium-Strong: 0.7
      Medium: 0.45
      Lower: 0.2
    fast_track_equiv_shows: 1    # never-seen fast-track artist counts as this many shows
    # rarely touched:
    seen_scale: 2.5              # shows to reach ~63% of the seen score (higher = slower ramp)
    bands: {high: 0.60, medium: 0.30}    # gauge label cutoffs (low = below medium)

# Show goals — the tracked accomplishments that produce badges on show rows and in the
# artist modal, and contribute to the affinity G-term. See docs/GOALS_SPEC.md for the
# full spec (source-binding vocabulary, state rules, weight validator). A fork may add,
# remove, or edit any entry without code changes.
#
# Fields per entry:
#   key         - stable identifier (hat, book, ...); used in badges, index, and CSS vars
#   label       - short display string for the badge
#   icon        - emoji string
#   color       - base color; --<key>-dim and --<key>-bg are auto-derived via HSL darkening
#   color_dim   - (optional) explicit override for --<key>-dim (skip HSL derivation)
#   color_bg    - (optional) explicit override for --<key>-bg  (skip HSL derivation)
#   source      - binding rule: event_log:<file> | column:<name> | interaction:<value>[|<value>]
#   eligibility - (optional) eligibility file name (without extension) under data/show_goals/
#   weight      - (optional) affinity contribution; if any entries have weights, they must sum to 1.0
#
# Deleting show_goals entirely (or emptying the list) yields a badge-free but functional
# site — the #85 exit criterion. photo and video goals are held for #140 (S4) alongside
# the app.js row-badge rendering rules that would give them visible effect.
show_goals:
  - key: hat
    label: HAT
    icon: "🎩"
    color: "#d08040"                       # tan orange (was theme.color_hat)
    source: event_log:hat_signatures
    eligibility: hat_eligibility
    weight: 0.6
  - key: book
    label: BOOK
    icon: "📚"
    color: "#a080c0"                       # lavender (was theme.color_book)
    source: event_log:book_signatures
    eligibility: autograph_books_eligibility
    weight: 0.4

theme:
  # Accent color — drives active tabs, dates, site title. Must pass WCAG AA as large-text.
  # Current value #c83020 is intentionally preserved (see issue #71 / PR #81 discussion).
  # Minimum AA-compliant value for this background: approx #ec4535.
  color_accent: "#c83020"         # brick red

  # Decision group colors — _dim and _bg variants are computed automatically from the
  # base color using HSL darkening; override them explicitly if you want fine control.
  color_buy: "#4a9a5a"            # sea green
  color_choose: "#c8a830"         # goldenrod
  color_sell: "#40a0a0"           # teal
  color_pass: "#878380"           # stone gray

  # Page chrome — neutral scaffold, independent of accent system. `_bright` is the raised
  # layer (buttons, inputs, pills, hover borders) sitting one step above the base.
  color_bg: "#0f0f0f"             # near-black
  color_surface: "#1a1a1a"        # charcoal
  color_surface_bright: "#222222" # dark gray
  color_border: "#2e2e2e"         # gray
  color_border_bright: "#3a3a3a"  # medium gray
  color_text: "#e8e4dc"           # bone white
  color_text_muted: "#9a928a"     # taupe gray
  color_text_dim: "#8e8a7a"       # khaki gray

  # Status row tints
  color_today_bg: "#1e0e0e"       # very dark maroon
  color_soon_bg: "#1a1408"        # very dark amber-brown
  color_otd_bg: "#0e1a10"         # very dark green
  color_otd_border: "#1a4a28"     # forest green

  # Fonts — loaded from Google Fonts. Change both names to swap the entire typeface.
  # To use system fonts, set fallback stacks directly: e.g. "monospace" or "sans-serif".
  font_mono: "'IBM Plex Mono', monospace"
  font_sans: "'IBM Plex Sans', sans-serif"
